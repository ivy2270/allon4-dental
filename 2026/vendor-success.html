<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消費成功</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background: #ecfdf5; color: #172033; }
  </style>
</head>
<body>
  <main class="mx-auto flex min-h-screen w-full max-w-md flex-col justify-center px-4 py-6">
    <section class="rounded-md border border-emerald-200 bg-white p-6 text-center shadow-sm">
      <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-md bg-emerald-50 text-emerald-700">
        <i data-lucide="check-circle-2" class="h-9 w-9"></i>
      </div>
      <p class="text-sm font-bold text-emerald-700">牙材券扣款完成</p>
      <h1 class="mt-1 text-2xl font-black text-slate-950">消費成功</h1>

      <div class="mt-5 rounded-md border border-slate-200 p-4">
        <p class="text-sm font-bold text-slate-500">醫師</p>
        <p id="nameText" class="mt-1 text-xl font-black text-slate-950"></p>
      </div>

      <div class="mt-3 rounded-md bg-emerald-50 p-4">
        <p class="text-sm font-bold text-emerald-700">本筆消費金額</p>
        <p id="amountText" class="mt-1 text-4xl font-black text-emerald-700"></p>
      </div>

      <div class="mt-3 rounded-md border border-slate-200 p-4">
        <p class="text-sm font-bold text-slate-500">廠商</p>
        <p id="vendorText" class="mt-1 text-lg font-black text-blue-700"></p>
      </div>

      <a href="gate.html" class="mt-5 inline-flex w-full items-center justify-center gap-2 rounded-md bg-slate-900 px-4 py-3 font-black text-white">
        <i data-lucide="scan-line" class="h-5 w-5"></i>
        繼續掃描下一位
      </a>
      <a id="manualLink" href="form.html" class="mt-3 inline-flex w-full items-center justify-center gap-2 rounded-md border border-slate-200 bg-white px-4 py-3 font-black text-slate-700">
        <i data-lucide="keyboard" class="h-5 w-5"></i>
        手動輸入醫師
      </a>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const amount = Number(params.get("amount") || 0);
    document.getElementById("nameText").textContent = params.get("name") || "-";
    document.getElementById("amountText").textContent = "NT$ " + amount.toLocaleString("zh-TW");
    document.getElementById("vendorText").textContent = params.get("vendor") || "-";

    // Build manual link preserving vendor credentials
    const manualParams = new URLSearchParams();
    if (params.get("vendor")) manualParams.set("vendor", params.get("vendor"));
    if (params.get("vkey")) manualParams.set("vkey", params.get("vkey"));
    const manualHref = "form.html" + (manualParams.toString() ? "?" + manualParams.toString() : "");
    document.getElementById("manualLink").href = manualHref;

    lucide.createIcons();
  </script>
</body>
</html>
