<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>牙材券消費</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4a90e2; --bg: #f5f7fa; --text: #2c3e50; --error: #e74c3c; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; overflow-x: hidden; }
        .card { background: white; width: 100%; max-width: 380px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 25px; }
        h1 { font-size: 20px; color: var(--text); margin: 0; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 12px; font-size: 16px; transition: 0.2s; appearance: none; }
        input:read-only { background-color: #f8f9fa; color: #888; border-color: #eee; }
        input:focus { outline: none; border-color: var(--primary); }
        
        .password-wrapper { position: relative; width: 100%; }
        .toggle-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #999; font-size: 16px; user-select: none; z-index: 10; }

        .btn { width: 100%; padding: 16px; font-size: 18px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; background: var(--primary); color: white; margin-top: 10px; box-shadow: 0 4px 15px rgba(74, 144, 226, 0.2); }
        .btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
        
        #msg { text-align: center; margin-top: 15px; font-weight: bold; min-height: 20px; font-size: 14px; }
        .error-msg { color: var(--error); }
        
        .candidate-item { padding: 12px; border: 1px solid #ffeeba; background: #fff; margin-top: 8px; border-radius: 10px; cursor: pointer; font-weight: bold; color: #856404; display: flex; justify-content: space-between; font-size: 14px; }
        .custom-footer { margin-top: 20px; padding-bottom: 10px; text-align: center; color: #d1d8dd; font-size: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header"><h1>💳 牙材券消費紀錄</h1></div>
    <form id="consumeForm">
        <div class="form-group">
            <label>醫師姓名</label>
            <div style="display: flex; gap: 8px;">
                <input type="text" name="name" id="docName" placeholder="請輸入醫師姓名" required>
                <button type="button" id="lookupBtn" class="btn" style="width:auto; margin:0; padding:0 15px; font-size:14px; white-space:nowrap;">搜尋</button>
            </div>
            <div id="candidate-box" style="display:none; margin-top:10px; background:#fff3cd; padding:12px; border-radius:12px; border:1px solid #ffeeba;">
                <p style="font-size:12px; margin:0 0 5px 0; font-weight:bold;">請選擇正確序號：</p>
                <div id="candidate-list"></div>
            </div>
        </div>

        <div class="form-group" id="id-display-group" style="display:none;">
            <label>報名序號</label>
            <input type="text" id="displayId" readonly style="color:var(--primary); font-weight:bold;">
            <input type="hidden" name="id" id="docId">
        </div>

        <div class="form-group">
            <label>消費金額 (1000的倍數)</label>
            <input type="number" name="amount" id="amount" placeholder="請輸入金額" required min="1000" step="1000">
        </div>

        <div class="form-group">
            <label>廠商 (必選)</label>
            <select name="vendor" id="vendorSelect" required>
                <option value="">-- 載入中 --</option>
            </select>
        </div>

        <div class="form-group">
            <label>身份證後四碼 (核對身分)</label>
            <div class="password-wrapper">
                <input type="password" name="password" id="password" placeholder="請輸入四位數字" required maxlength="4">
                <span class="toggle-btn" id="togglePassword">
                    <i class="fa-regular fa-eye-slash"></i>
                </span>
            </div>
        </div>

        <div class="form-group">
            <label>備註 (選填)</label>
            <input type="text" name="note" placeholder="品名或用途">
        </div>

        <div id="msg"></div>
        <button type="submit" id="submitBtn" class="btn">確認扣款</button>
    </form>
</div>

<footer class="custom-footer">
    <p>System v2.6.0 | <a href="javascript:void(0);" onclick="resetWorkMode()" style="color:#d1d8dd; text-decoration:none;">重置身分</a></p>
</footer>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyoaZ3j0WjToUSMOsFHJtgK9fLxu-03APP0vn4ZIybWNHMb3Z0tVPGnklsMEQ7Xots/exec'; 
    let hiddenBalance = 0; // 雖然存儲在 JS 變數，但不在 HTML 中渲染顯示
    let isReady = false;

    // 密碼切換
    const togglePassword = document.querySelector('#togglePassword');
    const passwordInput = document.querySelector('#password');
    togglePassword.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.innerHTML = type === 'password' ? '<i class="fa-regular fa-eye-slash"></i>' : '<i class="fa-regular fa-eye"></i>';
    });

    window.onload = async function() {
        const params = new URLSearchParams(window.location.search);
        const urlId = params.get('id'); 
        const urlName = params.get('name');
        const urlVendor = params.get('vendor') || localStorage.getItem('work_vendor');
        await loadVendors(urlVendor);
        if (urlId && urlName) {
            applyDoctor({ name: urlName, id: urlId });
            document.getElementById('lookupBtn').style.display = 'none';
        } else {
            document.getElementById('lookupBtn').onclick = performLookup;
        }
    };

    async function loadVendors(selectedVendor) {
        const select = document.getElementById('vendorSelect');
        try {
            const resp = await fetch(`${GAS_URL}?action=getVendors`);
            const data = await resp.json();
            if (data.status === "success") {
                const list = data.message.split(',').map(v => v.trim());
                let html = '<option value="">-- 請選擇廠商 --</option>';
                list.forEach(v => {
                    const active = (v === selectedVendor) ? 'selected' : '';
                    html += `<option value="${v}" ${active}>${v}</option>`;
                });
                select.innerHTML = html;
            }
        } catch (e) { select.innerHTML = '<option value="">載入失敗</option>'; }
    }

    async function performLookup() {
        const name = document.getElementById('docName').value.trim();
        if (!name) return;
        updateMsg("🔍 搜尋中...", false);
        try {
            const resp = await fetch(`${GAS_URL}?action=lookup&name=${encodeURIComponent(name)}`);
            const data = await resp.json();
            if (data.status === "success" && data.message.length > 0) {
                if (data.message.length === 1) {
                    applyDoctor(data.message[0]);
                } else { showCandidates(data.message); }
            } else { updateMsg("❌ 找不到醫師資料", true); }
        } catch (e) { updateMsg("⚠️ 連線異常", true); }
    }

    function showCandidates(docs) {
        const box = document.getElementById('candidate-box');
        const list = document.getElementById('candidate-list');
        list.innerHTML = '';
        box.style.display = 'block';
        docs.forEach(doc => {
            const item = document.createElement('div');
            item.className = 'candidate-item';
            item.innerHTML = `<span>醫師: ${doc.name}</span> <span>ID: ${doc.id}</span>`;
            item.onclick = () => applyDoctor(doc);
            list.appendChild(item);
        });
        updateMsg("請點選序號確認身分", false);
    }

    async function applyDoctor(doc) {
        isReady = false;
        document.getElementById('docName').value = doc.name;
        document.getElementById('docName').readOnly = true;
        document.getElementById('docId').value = doc.id;
        document.getElementById('displayId').value = doc.id;
        document.getElementById('id-display-group').style.display = 'block';
        document.getElementById('candidate-box').style.display = 'none';
        
        updateMsg("⌛ 資料核對中...", false);
        try {
            const resp = await fetch(`${GAS_URL}?action=checkBalance&id=${encodeURIComponent(doc.id)}`);
            const data = await resp.json();
            if (data.status === "success") {
                hiddenBalance = data.balance; // 靜默鎖定餘額
                isReady = true;
                updateMsg(`✅ 醫師資料鎖定成功`, false); // 不再秀出餘額數字
            } else { updateMsg("❌ 無法取得驗證資訊", true); }
        } catch (e) { updateMsg("⚠️ 網路錯誤", true); }
    }

    document.getElementById('consumeForm').onsubmit = async function(e) {
        e.preventDefault();
        if (!isReady) return updateMsg("❌ 請先選定醫師", true);
        
        const btn = document.getElementById('submitBtn');
        const amount = parseInt(document.getElementById('amount').value);
        
        // 餘額檢查 (背景執行)
        if (amount > hiddenBalance) {
            updateMsg("❌ 剩餘額度不足", true);
            return;
        }

        btn.disabled = true;
        updateMsg("🚀 處理中...", false);
        const payload = Object.fromEntries(new FormData(this).entries());

        try {
            const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await response.json();
            if (result.status === "success") {
                window.location.href = `vendor-success.html?name=${encodeURIComponent(payload.name)}&amount=${amount}&vendor=${encodeURIComponent(payload.vendor)}`;
            } else {
                updateMsg("❌ " + result.message, true);
                btn.disabled = false;
            }
        } catch (err) {
            updateMsg("⚠️ 連線異常，請重試", true);
            btn.disabled = false;
        }
    };

    function updateMsg(text, isError) {
        const m = document.getElementById('msg');
        m.textContent = text;
        m.className = isError ? "error-msg" : "";
    }

    function resetWorkMode() {
        if (confirm("確定要重置廠商身分嗎？")) {
            localStorage.clear();
            window.location.href = "gate.html";
        }
    }
</script>
</body>
</html>
