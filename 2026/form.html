<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>牙材券消費</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f5f7fa; --text: #2c3e50; --error: #e74c3c; }
        
        * { box-sizing: border-box; } /* 關鍵：防止寬度溢出 */

        body { 
            font-family: -apple-system, "Noto Sans TC", sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            overflow-x: hidden; /* 禁止左右滑動 */
        }

        .card { 
            background: white; 
            width: 100%; 
            max-width: 380px; /* 統一寬度規範 */
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        .header { text-align: center; margin-bottom: 25px; }
        h1 { font-size: 20px; color: var(--text); margin: 0; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; font-size: 14px; }
        
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1.5px solid #eee; 
            border-radius: 12px; 
            font-size: 16px; 
            transition: 0.2s; 
            appearance: none; /* 移除行動裝置內建樣式干擾 */
        }
        
        input:read-only { background-color: #f8f9fa; color: #888; border-color: #eee; }
        input:focus { outline: none; border-color: var(--primary); }
        
        .btn { 
            width: 100%; 
            padding: 16px; 
            font-size: 18px; 
            font-weight: 600; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            background: var(--primary); 
            color: white; 
            margin-top: 10px; 
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.2);
        }
        .btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
        
        #msg { text-align: center; margin-top: 15px; font-weight: bold; min-height: 20px; font-size: 14px; }
        .error-msg { color: var(--error); }
        
        /* 隱藏版 Footer */
        .custom-footer {
            margin-top: 20px;
            padding-bottom: 10px;
            text-align: center;
            color: #d1d8dd; /* 極淡灰色 */
            font-size: 10px;
            letter-spacing: 0.5px;
        }
        .custom-footer a {
            color: #d1d8dd;
            text-decoration: none;
            cursor: default;
        }
        .custom-footer a:active { color: #bdc3c7; }
    </style>
</head>
<body>

<div class="card">
    <div class="header"><h1>💳 牙材券消費紀錄</h1></div>
    <form id="consumeForm">
        <div class="form-group">
            <label>醫師姓名</label>
            <input type="text" name="name" id="docName" placeholder="請輸入醫師姓名" required>
        </div>

        <div class="form-group">
            <label>消費金額 (1000的倍數)</label>
            <input type="number" name="amount" id="amount" placeholder="請輸入金額" required min="1000" step="1000">
        </div>

        <div class="form-group">
            <label>廠商 (必選)</label>
            <select name="vendor" id="vendorSelect" required>
                <option value="">-- 載入中 --</option>
            </select>
        </div>

        <div class="form-group">
            <label>身份證後四碼 (核對身分)</label>
            <input type="password" name="password" id="password" placeholder="請詢問醫師身份證後四碼" required maxlength="4">
        </div>

        <div class="form-group">
            <label>備註 (選填)</label>
            <input type="text" name="note" placeholder="品名或用途">
        </div>

        <div id="msg"></div>
        <button type="submit" id="submitBtn" class="btn">確認消費</button>
    </form>
</div>

<footer class="custom-footer">
    <p>
        System v2.4.1 | 
        <a href="javascript:void(0);" onclick="resetWorkMode()">重置身分</a>
    </p>
</footer>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycby6FiikxJFNCyjOwXGY4PxqSpd6W_UIfpUPa0y6w_0dN3-q3wiX-lkViG0jvQE8aWlz/exec'; 
    let hiddenBalance = 0;
    let isReady = false;

    window.onload = async function() {
        const params = new URLSearchParams(window.location.search);
        const urlId = params.get('id'); 
        const urlVendor = params.get('vendor') || localStorage.getItem('work_vendor');

        await loadVendors(urlVendor);

        const nameInput = document.getElementById('docName');
        if (urlId) {
            nameInput.value = urlId;
            nameInput.readOnly = true;
            fetchBalance(urlId);
        } else {
            nameInput.addEventListener('blur', function() {
                if (this.value.trim()) fetchBalance(this.value.trim());
            });
        }
    };

    async function loadVendors(selectedVendor) {
        const select = document.getElementById('vendorSelect');
        try {
            const resp = await fetch(`${GAS_URL}?action=getVendors`);
            const data = await resp.json();
            if (data.status === "success" && data.message) {
                const list = data.message.split(',').map(v => v.trim());
                let html = '<option value="">-- 請選擇廠商 --</option>';
                list.forEach(v => {
                    const active = (v === selectedVendor) ? 'selected' : '';
                    html += `<option value="${v}" ${active}>${v}</option>`;
                });
                select.innerHTML = html;
            }
        } catch (e) { select.innerHTML = '<option value="">載入失敗</option>'; }
    }

    async function fetchBalance(name) {
        if (!name) return;
        isReady = false;
        updateMsg("正在核對醫師資料...", false);
        try {
            const resp = await fetch(`${GAS_URL}?action=checkBalance&name=${encodeURIComponent(name)}`);
            const data = await resp.json();
            if (data.status === "success") {
                hiddenBalance = data.balance;
                isReady = true;
                updateMsg("✅ 醫師資料核對成功", false);
                document.getElementById('docName').style.borderColor = "#eee";
            } else {
                hiddenBalance = 0;
                isReady = false;
                updateMsg("❌ 找不到此醫師資料", true);
                document.getElementById('docName').style.borderColor = "red";
            }
        } catch (e) {
            updateMsg("⚠️ 網路連線異常", true);
            isReady = false;
        }
    }

    document.getElementById('amount').addEventListener('blur', function() {
        const val = parseInt(this.value);
        if (!val) return;
        if (val % 1000 !== 0) updateMsg("❌ 金額必須是 1000 的倍數", true);
        else if (isReady && val > hiddenBalance) updateMsg(`❌ 餘額不足`, true);
        else updateMsg("金額檢查 OK", false);
    });

    document.getElementById('consumeForm').onsubmit = async function(e) {
        e.preventDefault();
        if (!isReady) { updateMsg("❌ 請先確保醫師姓名正確", true); return; }

        const btn = document.getElementById('submitBtn');
        const amount = parseInt(document.getElementById('amount').value);
        if (amount > hiddenBalance) { updateMsg("❌ 餘額不足", true); return; }

        btn.disabled = true;
        updateMsg("正在處理...", false);
        const payload = Object.fromEntries(new FormData(this).entries());

        try {
            const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await response.json();
            if (result.status === "success") {
                window.location.href = `vendor-success.html?name=${encodeURIComponent(payload.name)}&amount=${amount}&vendor=${encodeURIComponent(payload.vendor)}`;
            } else {
                updateMsg("❌ " + result.message, true);
                btn.disabled = false;
            }
        } catch (err) {
            fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            setTimeout(() => {
                window.location.href = `vendor-success.html?name=${encodeURIComponent(payload.name)}&amount=${amount}&vendor=${encodeURIComponent(payload.vendor)}`;
            }, 1000);
        }
    };

    function updateMsg(text, isError) {
        const m = document.getElementById('msg');
        m.textContent = text;
        m.className = isError ? "error-msg" : "";
    }

    function resetWorkMode() {
        if (confirm("確定要清除目前的工作身分並重新設定嗎？")) {
            localStorage.removeItem('work_mode');
            localStorage.removeItem('work_vendor');
            localStorage.removeItem('work_action');
            window.location.href = "gate.html";
        }
    }
</script>
</body>
</html>
