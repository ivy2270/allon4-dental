<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身分識別中 - 醫師服務系統</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f5f7fa; --text: #2c3e50; --success: #27ae60; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; color: var(--text); }
        .card { background: white; width: 90%; max-width: 400px; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .status-msg { font-size: 15px; color: #777; line-height: 1.5; }
        .warning-icon { font-size: 48px; margin-bottom: 15px; }
        .highlight { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div id="loading-ui">
        <div class="loader"></div>
        <div class="status-title" id="status-title">正在識別身分...</div>
        <div class="status-msg" id="status-msg">請稍候，正在為您導向正確的系統</div>
    </div>

    <div id="error-ui" style="display:none;">
        <div class="warning-icon">⚠️</div>
        <div class="status-title">尚未設定工作身分</div>
        <div class="status-msg">
            請先掃描您工作位子上的<br><span class="highlight">「身分登入 QR Code」</span><br>以利系統自動識別報到處或廠商。
        </div>
    </div>
</div>

<script>
    // --- 🛠 核心配置區 🛠 ---
    const CONFIG = {
        checkinPage: "https://app.allon4-dental.tw/2026/confirmation.html", 
        spendPage: "https://app.allon4-dental.tw/2026/form.html" 
    };

    const params = new URLSearchParams(window.location.search);
    const name = params.get('name'); // 醫師 QR Code 參數
    const id = params.get('id');     // 醫師 QR Code 參數
    
    // 身分設定參數
    const setRole = params.get('role');
    const setVendor = params.get('vendor'); // 配合你的網址使用 vendor=01海昌
    const setAction = params.get('action');

    // --- 1. 【核心修正】優先處理身分切換 ---
    // 如果網址帶有 role 或 vendor 參數，代表這是一個「身分設定行為」，必須強制覆蓋 localStorage
    if (setRole === 'checkin' || setVendor) {
        if (setRole === 'checkin') {
            const action = setAction || 'checkin';
            localStorage.setItem('work_mode', 'checkin');
            localStorage.setItem('work_action', action);
            localStorage.removeItem('work_vendor'); // 清除廠商快取防止混淆
            showConfigSuccess(action === 'checkin' ? "報到處 (簽到模式)" : "報到處 (簽退模式)");
        } 
        else if (setVendor) {
            localStorage.setItem('work_mode', 'vendor');
            localStorage.setItem('work_vendor', setVendor);
            localStorage.removeItem('work_action'); // 清除簽到快取防止混淆
            showConfigSuccess(`廠商：${setVendor}`);
        }
    } 
    // --- 2. 自動導向邏輯 (掃描醫師 QR Code 時) ---
    else if (id) { // 只要有 id 就代表在掃醫師
        const currentMode = localStorage.getItem('work_mode');
        const currentVendor = localStorage.getItem('work_vendor');
        const currentAction = localStorage.getItem('work_action') || 'checkin';
        
        // 統一參數：使用 id 與 name (如果 name 為空則不傳或傳空)
        const docName = name || "";
        const commonParams = `?id=${encodeURIComponent(id)}&name=${encodeURIComponent(docName)}`;

        if (currentMode === 'checkin') {
            const modeText = currentAction === 'checkin' ? "簽到" : "簽退";
            updateStatus(`識別為：報到處 (${modeText})`, "正在開啟確認頁面...");
            window.location.href = CONFIG.checkinPage + commonParams + `&action=${currentAction}`;
        } 
        else if (currentMode === 'vendor') {
            updateStatus(`識別為：${currentVendor}`, "正在開啟消費表單...");
            // 注意：這裡將 vendor 傳給 form.html
            window.location.href = CONFIG.spendPage + commonParams + `&vendor=${encodeURIComponent(currentVendor)}`;
        } 
        else {
            showError();
        }
    } 
    // --- 3. 預設狀態顯示 ---
    else {
        const currentMode = localStorage.getItem('work_mode');
        if (currentMode) {
            const modeName = currentMode === 'checkin' ? 
                (localStorage.getItem('work_action') === 'checkout' ? "報到處 (簽退)" : "報到處 (簽到)") : 
                localStorage.getItem('work_vendor');
            updateStatus("系統就緒", `目前模式：<span class="highlight">${modeName}</span><br>請直接掃描醫師 QR Code`);
        } else {
            showError();
        }
    }

    function updateStatus(title, msg) {
        document.getElementById('status-title').textContent = title;
        document.getElementById('status-msg').innerHTML = msg;
    }

    function showError() {
        document.getElementById('loading-ui').style.display = 'none';
        document.getElementById('error-ui').style.display = 'block';
    }

    function showConfigSuccess(identity) {
        document.getElementById('loading-ui').style.display = 'block';
        document.getElementById('error-ui').style.display = 'none';
        document.getElementById('status-title').textContent = "設定成功！";
        document.getElementById('status-msg').innerHTML = `已鎖定身分為：<br><span class="highlight">${identity}</span><br><br>正在切換模式...`;
        
        // 延遲一下讓使用者看清楚身分，然後導向不帶參數的 Gate 頁面（清除網址列參數）
        setTimeout(() => {
            window.location.href = window.location.origin + window.location.pathname;
        }, 1500);
    }
</script>
</body>
</html>
