<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作成功</title>
    <style>
        :root { --success: #27ae60; --bg: #f1f9f5; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 400px; padding: 50px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(39, 174, 96, 0.1); text-align: center; }
        .success-icon { font-size: 64px; color: var(--success); margin-bottom: 20px; }
        h1 { font-size: 28px; color: #2c3e50; margin: 0 0 10px; }
        p { font-size: 18px; color: #5f6368; line-height: 1.6; margin-bottom: 35px; }
        .doctor-highlight { color: var(--success); font-weight: bold; }
        .back-btn { display: inline-block; width: 100%; padding: 16px; font-size: 18px; font-weight: 600; border: none; border-radius: 12px; background: #2c3e50; color: white; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-decoration: none; }
        .back-btn:hover { background: #1a252f; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="card">
    <div class="success-icon">✅</div>
    <h1>操作成功</h1>
    <p>醫師 <span class="doctor-highlight" id="name-txt">讀取中...</span><br>
       已完成 <span id="action-txt">---</span> 作業</p>
    
    <a href="https://app.allon4-dental.tw/2026/gate.html" onclick="handleBack(event)" class="back-btn">完成並掃描下一位</a>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const doctorName = params.get('name');
    const actionName = params.get('action');

    // 顯示資訊
    document.getElementById('name-txt').textContent = doctorName || "未知";
    document.getElementById('action-txt').textContent = actionName || "處理";

    function handleBack(e) {
        // 嘗試關閉視窗（適用於某些手機掃描器的內建瀏覽器）
        if (window.close()) {
            e.preventDefault();
        }
        // 如果沒關閉，就會執行預設連結跳轉回 gate.html
    }
</script>

</body>
</html>
