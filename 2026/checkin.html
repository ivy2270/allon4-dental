<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>報到確認</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background: #eef2f7; color: #172033; }
  </style>
</head>
<body>
  <main class="mx-auto flex min-h-screen w-full max-w-lg flex-col justify-center px-4 py-6">
    <section class="rounded-md border border-slate-200 bg-white p-5 shadow-sm">
      <header class="mb-5 flex items-start justify-between gap-3">
        <div>
          <p id="modeLabel" class="text-sm font-bold text-blue-700">報到櫃台</p>
          <h1 class="mt-1 text-2xl font-black text-slate-950">報到確認</h1>
        </div>
        <div id="modeIcon" class="flex h-11 w-11 items-center justify-center rounded-md bg-blue-50 text-blue-700">
          <i data-lucide="scan-line" class="h-6 w-6"></i>
        </div>
      </header>

      <div id="loadingView" class="py-8 text-center">
        <div class="mx-auto mb-4 h-10 w-10 animate-spin rounded-full border-4 border-blue-600 border-t-transparent"></div>
        <p class="font-bold text-slate-700">正在讀取報名資料...</p>
      </div>

      <div id="errorView" class="hidden rounded-md border border-red-200 bg-red-50 p-4 text-red-700">
        <p class="font-black">讀取失敗</p>
        <p id="errorText" class="mt-1 text-sm leading-6"></p>
      </div>

      <!-- 手動查詢區塊 -->
      <div id="manualSearchView" class="hidden mt-4 space-y-3">
        <div class="rounded-md border border-slate-200 bg-slate-50 p-4">
          <p class="mb-3 text-sm font-bold text-slate-600">手動查詢報名資料</p>
          <div class="flex gap-2">
            <input id="manualNameInput" type="text" placeholder="輸入醫師姓名"
              class="flex-1 rounded-md border border-slate-300 px-3 py-2 text-sm font-bold focus:border-blue-500 focus:outline-none" />
            <button id="manualSearchBtn"
              class="flex items-center gap-1 rounded-md bg-slate-700 px-4 py-2 text-sm font-black text-white hover:bg-slate-800 disabled:bg-slate-400">
              <i data-lucide="search" class="h-4 w-4"></i>
              查詢
            </button>
          </div>
        </div>
        <div id="manualSearchError" class="hidden rounded-md border border-red-200 bg-red-50 p-3 text-sm font-bold text-red-700"></div>
        <div id="manualResultsList" class="hidden space-y-2"></div>
      </div>

      <div id="contentView" class="hidden space-y-4">
        <div id="warningBox" class="hidden rounded-md border border-amber-200 bg-amber-50 p-3 text-sm font-bold leading-6 text-amber-800"></div>

        <section class="rounded-md border border-slate-200 p-4">
          <p class="text-sm font-bold text-slate-500">姓名</p>
          <p id="doctorName" class="mt-1 text-3xl font-black text-slate-950"></p>
          <p id="registrationNo" class="mt-1 font-mono text-sm text-slate-500"></p>
        </section>

        <dl class="grid gap-3 text-sm">
          <div class="flex items-center justify-between gap-3 rounded-md bg-slate-50 p-3">
            <dt class="font-bold text-slate-600">分流櫃台</dt>
            <dd id="branchSchool" class="font-black text-blue-700"></dd>
          </div>
          <div class="flex items-center justify-between gap-3 rounded-md bg-slate-50 p-3">
            <dt class="font-bold text-slate-600">學校</dt>
            <dd id="schoolName" class="font-black text-slate-900"></dd>
          </div>
          <div class="flex items-center justify-between gap-3 rounded-md bg-slate-50 p-3">
            <dt class="font-bold text-slate-600">報名身份</dt>
            <dd id="identityType" class="font-black text-slate-900"></dd>
          </div>
          <div class="flex items-center justify-between gap-3 rounded-md bg-slate-50 p-3">
            <dt class="font-bold text-slate-600">付款狀態</dt>
            <dd id="paymentStatus" class="font-black"></dd>
          </div>
          <div class="flex items-center justify-between gap-3 rounded-md bg-slate-50 p-3">
            <dt class="font-bold text-slate-600">牙材券金額</dt>
            <dd id="voucherAmount" class="font-black text-emerald-700"></dd>
          </div>
          <div class="flex items-center justify-between gap-3 rounded-md bg-slate-50 p-3">
            <dt class="font-bold text-slate-600">報到狀態</dt>
            <dd id="checkinStatus" class="font-black"></dd>
          </div>
        </dl>

        <button id="confirmBtn" class="flex w-full items-center justify-center gap-2 rounded-md bg-blue-700 px-4 py-4 text-lg font-black text-white shadow-sm hover:bg-blue-800 disabled:cursor-not-allowed disabled:bg-slate-400">
          <i data-lucide="check" class="h-5 w-5"></i>
          確認報到
        </button>

        <div id="nextActionBtns" class="hidden grid grid-cols-2 gap-3 pt-1">
          <button id="backToScanBtn" class="flex items-center justify-center gap-2 rounded-md border border-slate-300 bg-white px-4 py-3 text-sm font-black text-slate-700 shadow-sm hover:bg-slate-50">
            <i data-lucide="scan-line" class="h-4 w-4"></i>
            繼續掃 QR Code
          </button>
          <button id="goManualBtn" class="flex items-center justify-center gap-2 rounded-md border border-blue-200 bg-blue-50 px-4 py-3 text-sm font-black text-blue-700 shadow-sm hover:bg-blue-100">
            <i data-lucide="search" class="h-4 w-4"></i>
            手動查詢
          </button>
        </div>
      </div>
    </section>

    <footer class="mt-4 text-center text-xs text-slate-400">
      <button id="resetModeBtn" class="font-bold underline">清除工作模式</button>
    </footer>
  </main>

  <script>
    const CHECKIN_ENDPOINT = "https://ytfpmewrlsbvwgdfzknx.supabase.co/functions/v1/checkin";
    const SUPABASE_ANON_KEY = "";

    const params = new URLSearchParams(window.location.search);
    const registrationNo = params.get("id") || "";
    const qrName = params.get("name") || "";
    const checkinAction = params.get("action") || "checkin";

    // 手動報到時暫存選定的 registration_no 與 name
    let manualRegistrationNo = "";
    let manualName = "";
    let currentRegistration = null;

    const els = {
      modeLabel: document.getElementById("modeLabel"),
      loadingView: document.getElementById("loadingView"),
      errorView: document.getElementById("errorView"),
      errorText: document.getElementById("errorText"),
      manualSearchView: document.getElementById("manualSearchView"),
      manualNameInput: document.getElementById("manualNameInput"),
      manualSearchBtn: document.getElementById("manualSearchBtn"),
      manualSearchError: document.getElementById("manualSearchError"),
      manualResultsList: document.getElementById("manualResultsList"),
      contentView: document.getElementById("contentView"),
      warningBox: document.getElementById("warningBox"),
      doctorName: document.getElementById("doctorName"),
      registrationNo: document.getElementById("registrationNo"),
      branchSchool: document.getElementById("branchSchool"),
      schoolName: document.getElementById("schoolName"),
      identityType: document.getElementById("identityType"),
      paymentStatus: document.getElementById("paymentStatus"),
      voucherAmount: document.getElementById("voucherAmount"),
      checkinStatus: document.getElementById("checkinStatus"),
      confirmBtn: document.getElementById("confirmBtn"),
      nextActionBtns: document.getElementById("nextActionBtns"),
      backToScanBtn: document.getElementById("backToScanBtn"),
      goManualBtn: document.getElementById("goManualBtn"),
      resetModeBtn: document.getElementById("resetModeBtn")
    };

    function currency(value) {
      return "NT$ " + Number(value || 0).toLocaleString("zh-TW");
    }

    function apiHeaders() {
      const headers = { "Content-Type": "application/json" };
      if (SUPABASE_ANON_KEY) {
        headers.apikey = SUPABASE_ANON_KEY;
        headers.Authorization = `Bearer ${SUPABASE_ANON_KEY}`;
      }
      return headers;
    }

    async function callApi(payload) {
      const response = await fetch(CHECKIN_ENDPOINT, {
        method: "POST",
        headers: apiHeaders(),
        body: JSON.stringify(payload)
      });
      const result = await response.json();
      if (!response.ok || !result.success) {
        throw new Error(result.error || "操作失敗");
      }
      return result;
    }

    function paymentClass(status) {
      if (status === "matched") return "text-emerald-700";
      if (status === "pending") return "text-amber-700";
      return "text-red-700";
    }

    function sourceLabel(source) {
      return source === "on_site" ? "現場報名" : "預先報名";
    }

    // 決定報到時實際使用的 registrationNo / name（QR 或手動選取）
    function activeRegistrationNo() {
      return manualRegistrationNo || registrationNo;
    }
    function activeName() {
      return manualRegistrationNo ? manualName : qrName;
    }

    function render(registration) {
      currentRegistration = registration;
      const doctor = registration.doctors || {};
      const voucherAccount = registration.voucher_accounts || {};
      const warnings = [];

      if (registration.nameWarning) warnings.push(registration.nameWarning);
      if (registration.payment_status !== "matched") warnings.push("付款狀態尚非已入帳，請人工確認是否可報到。");
      if (registration.status === "cancelled") warnings.push("此報名已取消，請勿報到。");
      if (voucherAccount.checked_in) warnings.push("此報名已經完成報到。");

      els.warningBox.classList.toggle("hidden", warnings.length === 0);
      els.warningBox.innerHTML = warnings.map(item => `<p>${item}</p>`).join("");

      els.doctorName.textContent = doctor.name || activeName() || "-";
      els.registrationNo.textContent = registration.registration_no || activeRegistrationNo();
      els.branchSchool.textContent = registration.branch_school || "-";
      els.schoolName.textContent = doctor.school || "-";
      els.identityType.textContent = doctor.identity_type || "-";
      els.paymentStatus.textContent = registration.payment_label || registration.payment_status || "-";
      els.paymentStatus.className = "font-black " + paymentClass(registration.payment_status);
      els.voucherAmount.textContent = currency(voucherAccount.expected_amount || registration.voucher_amount || 0);
      els.checkinStatus.textContent = voucherAccount.checked_in ? "已報到" : "尚未報到";
      els.checkinStatus.className = voucherAccount.checked_in ? "font-black text-emerald-700" : "font-black text-slate-900";

      els.confirmBtn.disabled = registration.status === "cancelled" || (checkinAction === "checkin" && voucherAccount.checked_in);
      els.confirmBtn.innerHTML = checkinAction === "checkout"
        ? '<i data-lucide="undo-2" class="h-5 w-5"></i> 取消報到狀態'
        : '<i data-lucide="check" class="h-5 w-5"></i> 確認報到';

      // 報到完成後才顯示下一位按鈕
      const justCheckedIn = checkinAction === "checkin" && voucherAccount.checked_in;
      els.nextActionBtns.classList.toggle("hidden", !justCheckedIn);

      lucide.createIcons();
    }

    async function lookup() {
      if (!registrationNo) {
        showError("QR Code 缺少報名序號。");
        return;
      }
      try {
        const result = await callApi({
          action: "lookup",
          registrationNo,
          name: qrName
        });
        els.loadingView.classList.add("hidden");
        els.contentView.classList.remove("hidden");
        render(result.registration);
      } catch (error) {
        showError(error.message || "讀取失敗");
      }
    }

    function showError(message) {
      els.loadingView.classList.add("hidden");
      els.contentView.classList.add("hidden");
      els.errorView.classList.remove("hidden");
      els.errorText.textContent = message;
      // 顯示手動查詢區塊
      els.manualSearchView.classList.remove("hidden");
    }

    // ── 手動查詢 ──────────────────────────────────────────
    function renderManualResults(results) {
      els.manualResultsList.innerHTML = "";
      if (results.length === 0) {
        els.manualResultsList.innerHTML = `<p class="text-sm font-bold text-slate-500 text-center py-3">查無符合的報名資料</p>`;
        els.manualResultsList.classList.remove("hidden");
        return;
      }
      results.forEach(r => {
        const card = document.createElement("button");
        card.className = "w-full text-left rounded-md border border-slate-200 bg-white p-3 shadow-sm hover:border-blue-400 hover:bg-blue-50 transition-colors";
        const checkedInBadge = r.checked_in
          ? `<span class="ml-2 rounded px-1.5 py-0.5 text-xs font-black bg-emerald-100 text-emerald-700">已報到</span>`
          : `<span class="ml-2 rounded px-1.5 py-0.5 text-xs font-black bg-slate-100 text-slate-500">未報到</span>`;
        const sourceBadge = r.source === "on_site"
          ? `<span class="ml-1 rounded px-1.5 py-0.5 text-xs font-black bg-amber-100 text-amber-700">現場報名</span>`
          : "";
        card.innerHTML = `
          <div class="flex items-center justify-between gap-2">
            <span class="text-base font-black text-slate-900">${r.name}</span>
            <div class="flex items-center">${checkedInBadge}${sourceBadge}</div>
          </div>
          <div class="mt-1 flex flex-wrap gap-x-4 gap-y-0.5 text-xs text-slate-500 font-bold">
            <span>序號：${r.registration_no}</span>
            <span>學校：${r.school || "-"}</span>
            <span>分流：${r.branch_school || "-"}</span>
          </div>
          <div class="mt-1 text-xs font-bold">
            <span class="${r.payment_status === 'matched' ? 'text-emerald-700' : r.payment_status === 'pending' ? 'text-amber-700' : 'text-red-700'}">${r.payment_label}</span>
            <span class="ml-2 text-slate-400">${r.status_label}</span>
          </div>
        `;
        card.addEventListener("click", () => selectManualResult(r));
        els.manualResultsList.appendChild(card);
      });
      els.manualResultsList.classList.remove("hidden");
    }

    async function doManualSearch() {
      const name = els.manualNameInput.value.trim();
      if (!name) return;
      els.manualSearchBtn.disabled = true;
      els.manualSearchError.classList.add("hidden");
      els.manualResultsList.classList.add("hidden");
      try {
        const result = await callApi({ action: "lookupByName", name });
        renderManualResults(result.results || []);
      } catch (error) {
        els.manualSearchError.textContent = error.message || "查詢失敗";
        els.manualSearchError.classList.remove("hidden");
      } finally {
        els.manualSearchBtn.disabled = false;
      }
    }

    async function selectManualResult(r) {
      manualRegistrationNo = r.registration_no;
      manualName = r.name;
      // 隱藏手動查詢區塊，顯示 loading，再 lookup
      els.manualSearchView.classList.add("hidden");
      els.errorView.classList.add("hidden");
      els.loadingView.classList.remove("hidden");
      try {
        const result = await callApi({
          action: "lookup",
          registrationNo: manualRegistrationNo,
          name: manualName
        });
        els.loadingView.classList.add("hidden");
        els.contentView.classList.remove("hidden");
        render(result.registration);
      } catch (error) {
        manualRegistrationNo = "";
        manualName = "";
        showError(error.message || "讀取失敗");
      }
    }

    async function confirmCheckin() {
      if (!currentRegistration) return;
      const actionText = checkinAction === "checkout" ? "取消報到狀態" : "確認報到";
      if (!confirm(`確定要${actionText}？`)) return;

      els.confirmBtn.disabled = true;
      try {
        const result = await callApi({
          action: "confirm",
          registrationNo: activeRegistrationNo(),
          name: activeName(),
          checkinAction
        });
        render(result.registration);
      } catch (error) {
        alert(error.message || "操作失敗");
        els.confirmBtn.disabled = false;
      }
    }

    els.modeLabel.textContent = checkinAction === "checkout" ? "報到櫃台｜取消報到" : "報到櫃台";
    els.confirmBtn.addEventListener("click", confirmCheckin);
    els.backToScanBtn.addEventListener("click", () => history.back());
    els.goManualBtn.addEventListener("click", () => {
      // 重置狀態，回到手動查詢
      manualRegistrationNo = "";
      manualName = "";
      currentRegistration = null;
      els.contentView.classList.add("hidden");
      els.nextActionBtns.classList.add("hidden");
      els.errorView.classList.add("hidden");
      els.manualResultsList.classList.add("hidden");
      els.manualSearchError.classList.add("hidden");
      els.manualNameInput.value = "";
      els.manualSearchView.classList.remove("hidden");
      els.manualNameInput.focus();
    });
    els.manualSearchBtn.addEventListener("click", doManualSearch);
    els.manualNameInput.addEventListener("keydown", e => { if (e.key === "Enter") doManualSearch(); });
    els.resetModeBtn.addEventListener("click", () => {
      if (confirm("確定要清除這支手機的工作模式？")) {
        localStorage.removeItem("work_mode");
        localStorage.removeItem("work_action");
        localStorage.removeItem("work_vendor");
        window.location.href = "gate.html";
      }
    });

    lookup();
    lucide.createIcons();
  </script>
</body>
</html>
