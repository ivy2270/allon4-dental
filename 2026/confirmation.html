<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>確認資訊 - 醫師服務系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #f5f7fa; --text: #2c3e50; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: var(--bg); }
        .card { background: white; width: 92%; max-width: 380px; padding: 30px 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .info-box { background: #f8f9fa; padding: 16px; border-radius: 16px; margin-bottom: 24px; text-align: left; border-left: 4px solid var(--primary); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen m-0">

<div class="card">
    <div class="text-5xl mb-4">📝</div>
    <h1 class="text-xl font-bold text-slate-800 mb-4">確認報到資訊</h1>
    <div class="info-box">
        <div class="mb-2"><span class="font-bold text-slate-700">姓名：</span><span id="name-txt" class="text-blue-600 font-medium">讀取中...</span></div>
        <div class="mb-2"><span class="font-bold text-slate-700">編號：</span><span id="id-txt" class="text-slate-500">---</span></div>
        <div><span class="font-bold text-slate-700">動作：</span><span id="action-txt" class="text-orange-500 font-bold">---</span></div>
    </div>
    <button id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg transition-all active:scale-95">確認提交</button>
</div>

<footer class="mt-6 text-[10px] text-slate-300">
    System v2.4.2 | <a href="javascript:void(0);" onclick="resetWorkMode()" class="hover:text-slate-400">重置身分</a>
</footer>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzmUqDhEExlbShpr7IQWfkuCSVt3CQAbKTZAV8bx8P4qOryYPx3VAd3fm03a9434GOb/exec"; 
    const params = new URLSearchParams(window.location.search);
    
    // 現在 QR Code 已修正：id 是編號，name 是姓名
    const serialId = params.get('id');   // 編號 (如: 陽明003)
    const doctorName = params.get('name'); // 姓名 (如: 王華寧)

    const action = params.get('action') || 'checkin';
    const actionChinese = (action === 'checkout') ? '簽退' : '簽到';

    // 顯示在畫面上
    document.getElementById('name-txt').textContent = doctorName || '未知';
    document.getElementById('id-txt').textContent = serialId || '---';
    document.getElementById('action-txt').textContent = actionChinese;

    document.getElementById('submit-btn').onclick = async function() {
        if (!serialId || !doctorName) return alert("QR Code 資料格式不完整");
        
        this.disabled = true;
        this.textContent = "處理中...";

        try {
            // 傳送 JSON 給 GAS
            // 注意：這裡的 key 建議與 GAS 端收到的變數名稱一致
            await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", 
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ 
                    id: serialId, 
                    name: doctorName, 
                    action: action 
                })
            });

            // 延遲跳轉至成功頁面
            setTimeout(() => {
                window.location.href = `success.html?name=${encodeURIComponent(doctorName)}&action=${encodeURIComponent(actionChinese)}`;
            }, 800);
        } catch (err) {
            console.error(err);
            alert("連線失敗，請重試");
            this.disabled = false;
            this.textContent = "確認提交";
        }
    };

    function resetWorkMode() {
        if (confirm("確定重置身分？")) {
            localStorage.clear();
            window.location.href = "gate.html";
        }
    }
</script>
</body>
</html>
