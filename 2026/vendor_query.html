<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廠商對帳系統 | 2026 牙醫年會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        
        .card-settled { border-top: 4px solid #10b981; }
        .card-unsettled { border-top: 4px solid #f59e0b; }
        
        @media (max-width: 640px) {
            .rwd-table thead { display: none; }
            .rwd-table tr { display: block; background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
            .rwd-table td { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; text-align: right; }
            .rwd-table td:last-child { border-bottom: none; }
            .rwd-table td::before { content: attr(data-label); font-weight: bold; color: #64748b; font-size: 0.875rem; }
        }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-4xl mx-auto">
    <div class="text-center mb-8">
        <h1 id="vendor-name" class="text-3xl font-extrabold tracking-tight text-slate-900">廠商對帳系統</h1>
        <div id="status-badge" class="mt-3 inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-slate-200 text-slate-600">
            身份驗證中...
        </div>
    </div>

    <div id="summary-section" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 hidden">
        <div class="bg-slate-900 text-white rounded-3xl shadow-lg p-6 text-center">
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">總累積業績</p>
            <h2 id="total-amount" class="text-3xl font-black mt-2">$0</h2>
            <p id="record-count" class="text-slate-500 text-xs mt-2">共 0 筆紀錄</p>
        </div>
        <div class="bg-white rounded-3xl shadow-md p-6 text-center card-settled">
            <p class="text-emerald-500 text-xs font-bold uppercase tracking-widest">大會已撥款</p>
            <h2 id="settled-amount" class="text-3xl font-black mt-2 text-emerald-600">$0</h2>
            <p class="text-slate-400 text-xs mt-2">帳目已清</p>
        </div>
        <div class="bg-white rounded-3xl shadow-md p-6 text-center card-unsettled">
            <p class="text-amber-500 text-xs font-bold uppercase tracking-widest">現場待結算</p>
            <h2 id="unsettled-amount" class="text-3xl font-black mt-2 text-amber-600">$0</h2>
            <p class="text-slate-400 text-xs mt-2">活動後撥付</p>
        </div>
    </div>

    <div id="loading-state" class="text-center py-20">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mx-auto"></div>
        <p class="mt-4 text-slate-500 font-medium">正在載入即時業績...</p>
    </div>

    <div id="detail-box" class="hidden">
        <div class="flex items-center justify-between mb-4 px-2">
            <h3 class="font-bold text-slate-700 text-lg">明細彙整</h3>
            <button onclick="location.reload()" class="text-xs bg-white px-3 py-1.5 rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50">刷新</button>
        </div>
        
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
            <table class="w-full rwd-table">
                <thead class="bg-slate-50 text-slate-400 text-xs font-bold uppercase tracking-wider">
                    <tr>
                        <th class="text-left py-4 px-6">醫師</th>
                        <th class="text-right py-4 px-6">金額</th>
                        <th class="text-center py-4 px-6">狀態</th>
                        <th class="text-right py-4 px-6">時間</th>
                        <th class="text-left py-4 px-6">備註</th>
                    </tr>
                </thead>
                <tbody id="records-body" class="text-slate-700 divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwppzMRerionVLwK296HKS9-NdpJ3DkOURRVpTpb_StBJ6YVopzY4FxdsIa7x7nwq78/exec';

    window.onload = async () => {
        const params = new URLSearchParams(window.location.search);
        const vendor = params.get('v');
        const key = params.get('key');

        if (!vendor || !key) { showError(); return; }

        document.getElementById('vendor-name').innerText = `${vendor} - 對帳看板`;

        try {
            const resp = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'vendorQuery', vendor: vendor, key: key })
            });
            const data = await resp.json();

            if (data.success) {
                renderData(data);
                document.getElementById('status-badge').innerHTML = `✅ 已驗證：${vendor}`;
                document.getElementById('status-badge').className = "mt-3 inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-600";
            } else { showError(); }
        } catch (e) { showError(); }
        finally { document.getElementById('loading-state').classList.add('hidden'); }
    };

    function renderData(res) {
        const tbody = document.getElementById('records-body');
        const records = res.data;
        const sum = res.summary;

        document.getElementById('total-amount').innerText = `$${sum.total.toLocaleString()}`;
        document.getElementById('settled-amount').innerText = `$${sum.settled.toLocaleString()}`;
        document.getElementById('unsettled-amount').innerText = `$${sum.unsettled.toLocaleString()}`;

        if (records.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="py-10 text-center text-slate-400">尚未有消費紀錄</td></tr>`;
        } else {
            records.forEach(row => {
                const isSettled = row.status === '已結算';
                const statusColor = isSettled ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600';
                
                // --- 前端時間格式化處理 ---
                let displayTime = "-";
                try {
                    // 將 "Sat Apr 11 2026..." 轉回 Date 物件
                    const dateObj = new Date(row.time);
                    if (!isNaN(dateObj)) {
                        const m = (dateObj.getMonth() + 1).toString().padStart(2, '0');
                        const d = dateObj.getDate().toString().padStart(2, '0');
                        const hh = dateObj.getHours().toString().padStart(2, '0');
                        const mm = dateObj.getMinutes().toString().padStart(2, '0');
                        displayTime = `${m}/${d} ${hh}:${mm}`;
                    } else {
                        // 萬一解析失敗，回傳原始字串（或簡單裁切）
                        displayTime = row.time.toString().substring(4, 16); 
                    }
                } catch (e) {
                    displayTime = row.time;
                }
                // -------------------------

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors bg-white";
                tr.innerHTML = `
                    <td data-label="醫師" class="py-3 px-4 font-bold text-slate-800">${row.name}</td>
                    <td data-label="金額" class="py-3 px-4 text-blue-600 font-black text-right">$${row.amount.toLocaleString()}</td>
                    <td data-label="狀態" class="py-3 px-4 text-center"><span class="px-2 py-0.5 rounded text-[9px] font-bold uppercase ${statusColor}">${row.status}</span></td>
                    <td data-label="時間" class="py-3 px-4 text-slate-400 font-mono text-[11px] text-right">${displayTime}</td>
                    <td data-label="備註" class="py-3 px-4 text-slate-400 text-xs truncate max-w-[100px]">${row.note || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        document.getElementById('summary-section').classList.remove('hidden');
        document.getElementById('detail-box').classList.remove('hidden');
    }

    function showError() {
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('status-badge').innerHTML = `❌ 驗證失敗`;
        document.getElementById('status-badge').className = "mt-3 inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-600";
    }
</script>
</body>
</html>
