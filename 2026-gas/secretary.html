<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祕書結算系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 50; align-items: center; justify-content: center; }
        body.is-loading .loading-overlay { display: flex; }
        /* 優化手機端滾動體驗 */
        .table-container { 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none; /* Firefox */
        }
        .table-container::-webkit-scrollbar { display: none; /* Chrome/Safari */ }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div class="loading-overlay">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent"></div>
    </div>

    <div id="main-content" class="w-full max-w-2xl space-y-4">
        <header class="text-center py-4">
            <h1 class="text-2xl font-black text-slate-800">廠商現場結算</h1>
            <p class="text-slate-500 text-sm">核對明細後進行結清</p>
        </header>

        <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
            <select id="vendor-select" class="w-full border-2 border-slate-100 bg-slate-50 rounded-xl p-4 outline-none focus:border-blue-500 text-lg appearance-none transition-all cursor-pointer">
                <option value="">驗證授權中...</option>
            </select>
        </div>

        <div id="info-card" class="hidden space-y-4">
            <div class="bg-blue-600 p-6 rounded-3xl shadow-lg text-white text-center">
                <p class="opacity-80 text-xs font-bold uppercase tracking-widest">當下可領取總額</p>
                <p id="unsettled-total" class="text-4xl font-black my-2">NT$ 0</p>
                <div id="unsettled-count" class="inline-block bg-white/20 px-3 py-1 rounded-full text-xs font-mono">0 筆消費</div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-3 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                    <h3 class="font-bold text-slate-700 text-sm">待結明細 (可橫向滑動)</h3>
                </div>
                <div class="table-container">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead class="bg-slate-50 text-slate-400 text-xs uppercase">
                            <tr>
                                <th class="p-3 font-bold whitespace-nowrap">時間</th>
                                <th class="p-3 font-bold whitespace-nowrap">醫師</th>
                                <th class="p-3 font-bold whitespace-nowrap text-right">金額</th>
                                <th class="p-3 font-bold whitespace-nowrap">備註</th>
                                <th class="p-3 font-bold whitespace-nowrap">序號</th>
                            </tr>
                        </thead>
                        <tbody id="detail-list" class="divide-y divide-slate-100 whitespace-nowrap">
                            </tbody>
                    </table>
                </div>
            </div>

            <button id="settle-btn" class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-lg mb-8">
                確認發款並結算
            </button>
        </div>

        <div id="success-box" class="hidden bg-white p-10 rounded-3xl shadow-sm border-2 border-emerald-500 text-center">
            <div class="text-5xl mb-4">✅</div>
            <h3 class="text-xl font-bold text-slate-800">結算作業完成</h3>
            <div id="batch-display" class="mt-4 p-3 bg-slate-50 rounded-xl font-mono text-sm text-slate-500"></div>
            <button onclick="resetUI()" class="mt-8 w-full py-3 text-blue-600 font-bold underline cursor-pointer">處理下一筆</button>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz17cgHxpDWG_Mejdo4h8YZeExLxPUPyrVvpnq9nWehYRZFCzC86fSsBUyEhtiOBR_0/exec";
    let cachedPassword = "";

    // 重置介面，保留密碼不重新整理
    function resetUI() {
        document.getElementById('vendor-select').value = "";
        document.getElementById('info-card').classList.add('hidden');
        document.getElementById('success-box').classList.add('hidden');
        document.getElementById('detail-list').innerHTML = '';
    }

    async function fetchData(payload, successCallback) {
        document.body.classList.add('is-loading');
        payload.password = cachedPassword;
        try {
            const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            const data = await resp.json();
            if (data.success) {
                successCallback(data);
            } else if (data.error === "AUTH_FAILED") {
                alert("授權碼錯誤！");
                location.reload(); 
            } else { 
                alert("錯誤：" + data.error); 
            }
        } catch (e) { 
            alert("網路請求失敗，請檢查網路連線"); 
        } finally { 
            document.body.classList.remove('is-loading'); 
        }
    }

    async function init() {
        const pass = prompt("請輸入行政授權碼：");
        if (!pass) {
            document.body.innerHTML = "<div class='text-center mt-20 font-bold'>請重新整理網頁並輸入密碼以進入系統。</div>";
            return;
        }
        cachedPassword = pass;
        fetchData({ action: 'getVendorList' }, (data) => {
            const select = document.getElementById('vendor-select');
            select.innerHTML = '<option value="">請選取結算廠商</option>';
            data.vendors.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v;
                opt.textContent = v;
                select.appendChild(opt);
            });
        });
    }

    document.getElementById('vendor-select').onchange = function() {
        const vendor = this.value;
        if(!vendor) return document.getElementById('info-card').classList.add('hidden');
        
        fetchData({ action: 'getUnsettledInfo', vendorName: vendor }, (data) => {
            document.getElementById('info-card').classList.remove('hidden');
            document.getElementById('success-box').classList.add('hidden');
            document.getElementById('unsettled-total').textContent = "NT$ " + data.info.total.toLocaleString();
            document.getElementById('unsettled-count').textContent = data.info.count + " 筆未結消費";
            
            const listBody = document.getElementById('detail-list');
            listBody.innerHTML = '';
            data.info.details.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="px-3 py-4 text-slate-400 font-mono text-xs">${item.time}</td>
                    <td class="px-3 py-4 font-bold text-slate-700 min-w-[80px]">${item.name}</td>
                    <td class="px-3 py-4 text-right font-black text-blue-600 text-base">${item.amount.toLocaleString()}</td>
                    <td class="px-3 py-4 text-slate-500 text-xs max-w-[120px] truncate">${item.note || '-'}</td>
                    <td class="px-3 py-4 text-slate-300 font-mono text-[10px]">${item.id}</td>
                `;
                listBody.appendChild(tr);
            });
        });
    };

    document.getElementById('settle-btn').onclick = function() {
        const vendor = document.getElementById('vendor-select').value;
        if(!confirm(`確定已發放款項，並將「${vendor}」的帳目結清嗎？`)) return;
        
        fetchData({ action: 'processSettlement', vendorName: vendor }, (result) => {
            document.getElementById('info-card').classList.add('hidden');
            document.getElementById('success-box').classList.remove('hidden');
            document.getElementById('batch-display').textContent = "結算序號：" + result.batchId;
        });
    };

    window.onload = init;
</script>
</body>
</html>
