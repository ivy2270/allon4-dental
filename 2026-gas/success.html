<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>操作成功</title>
    <style>
        :root { --success: #27ae60; --bg: #f1f9f5; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); margin: 0; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100dvh; overflow: hidden; 
        }
        .card { 
            background: white; width: 85%; max-width: 350px; 
            padding: 40px 24px; border-radius: 24px; 
            box-shadow: 0 12px 40px rgba(39, 174, 96, 0.15); 
            text-align: center; 
        }
        .success-icon { font-size: 64px; margin-bottom: 20px; display: block; }
        h1 { font-size: 24px; color: #2c3e50; margin: 0 0 8px 0; }
        .doctor-name { color: var(--success); font-weight: 700; font-size: 22px; margin: 10px 0; display: block; }
        
        /* 強化操作引導區塊 */
        .instruction-box {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 16px;
            border: 1px solid #eee;
        }
        .instruction-item {
            display: flex;
            align-items: center;
            text-align: left;
            margin-bottom: 12px;
            font-size: 15px;
            color: #444;
        }
        .instruction-item:last-child { margin-bottom: 0; }
        .step-num {
            background: #2c3e50; color: white;
            width: 22px; height: 22px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; margin-right: 10px; flex-shrink: 0;
        }
        .highlight-blue { color: #4a90e2; font-weight: bold; }

        /* 弱化的返回連結：做成文字連結而不是大按鈕 */
        .footer-link {
            margin-top: 25px;
            display: inline-block;
            font-size: 14px;
            color: #bbb;
            text-decoration: none;
            border-bottom: 1px solid #ddd;
            padding-bottom: 2px;
        }
    </style>
</head>
<body>

<div class="card">
    <span class="success-icon">✅</span>
    <h1>操作成功</h1>
    <span class="doctor-name" id="name-txt">讀取中...</span>
    <p style="color:#666; margin: 0;">已完成 <b id="action-txt">---</b> 作業</p>
    
    <div class="instruction-box">
        <div class="instruction-item">
            <div class="step-num">1</div>
            <div>點擊左上角 <span class="highlight-blue">「✕」</span> 或 <span class="highlight-blue">「返回」</span></div>
        </div>
        <div class="instruction-item">
            <div class="step-num">2</div>
            <div>即可 <span style="font-weight:bold; color:var(--success);">繼續掃描</span> 下一位</div>
        </div>
    </div>

    <a href="gate.html" class="footer-link">回到首頁</a>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const doctorName = params.get('name');
    const actionValue = params.get('action');

    document.getElementById('name-txt').textContent = doctorName || "醫師";

    let displayAction = "處理";
    if (actionValue) {
        if (actionValue.includes('簽到') || actionValue === 'checkin') displayAction = "簽到";
        else if (actionValue.includes('簽退') || actionValue === 'checkout') displayAction = "簽退";
        else displayAction = actionValue;
    }
    document.getElementById('action-txt').textContent = displayAction;

    // 雖然按鈕不見了，但我們還是保留「自動嘗試關閉」的邏輯，萬一哪天 LINE 更新支援了呢？
    window.onload = function() {
        if (typeof WeixinJSBridge !== "undefined") {
            // LINE 內建瀏覽器環境
            setTimeout(() => {
                WeixinJSBridge.call('closeWindow');
            }, 2500); 
        }
    };
</script>
</body>
</html>
